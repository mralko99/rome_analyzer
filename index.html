<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlante Mobilità Roma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Lora:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      html, body, #root { margin: 0; padding: 0; height: 100%; }
      body { background: #f5f5f5; font-family: 'Titillium Web', system-ui, sans-serif; }
      * { box-sizing: border-box; }
      .maplibregl-ctrl-attrib { font-size: 10px; font-family: 'Titillium Web', sans-serif; }
      ::-webkit-scrollbar { width: 9px; height: 9px; }
      ::-webkit-scrollbar-thumb { background: #c5c7c9; border-radius: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      @keyframes amspin { to { transform: rotate(360deg); } }
      input[type=range] { accent-color: #003366; width: 100%; cursor: pointer; }
      input[type=color] { -webkit-appearance: none; appearance: none; border: 1px solid #c5c7c9; border-radius: 4px; width: 38px; height: 30px; padding: 0; cursor: pointer; background: #fff; }
      input[type=color]::-webkit-color-swatch-wrapper { padding: 3px; }
      input[type=color]::-webkit-color-swatch { border: none; border-radius: 2px; }
      select:focus, button:focus { outline: 2px solid #0066cc; outline-offset: 1px; }
      .map-cursor-crosshair .maplibregl-canvas { cursor: crosshair !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
